# ANKA OS - OTA Yapılandırması
# /system/etc/anka_ota.conf
#
# Kovan (GitHub) senkronizasyon ayarları.
# evrim_motoru.py bu dosyayı okuyarak güncelleme kanalını belirler.

# GitHub repo (kovan)
ANKA_OTA_REPO=emredersiniz16/anka

# Güncelleme kanalı: "release" (stable) veya "main" (geliştirme)
ANKA_OTA_CHANNEL=release

# Yerel kurulum dizini
ANKA_INSTALL_DIR=/system/anka_core

# Python3 yolu (ROM içi gömülü)
ANKA_PYTHON3=/system/anka_core/python3/bin/python3

# Güncelleme kontrolü aralığı (saniye) — varsayılan 6 saat
ANKA_OTA_INTERVAL=21600

# Güncelleme sonrası otomatik yeniden başlat (1 = evet, 0 = hayır)
ANKA_OTA_AUTO_REBOOT=0
