name: ANKA OS ROM Build (merlin)

on:
  # Branch push: sadece ilgili dosyalar değiştiğinde tetikle
  push:
    branches:
      - main
    paths:
      - 'core/**'
      - 'agents/**'
      - 'assets/**'
      - 'kovan/**'
      - 'rom_overlay/**'
      - 'launcher/**'
      - 'installer/**'
      - 'Makefile'
  # Tag push: her v* etiketinde tetikle (paths filtresi uygulanmaz)
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      channel:
        description: 'Yayın kanalı (release veya dev)'
        required: false
        default: 'dev'
      create_release:
        description: 'GitHub Release oluştur (true/false)'
        required: false
        default: 'false'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: Android Launcher APK Derleme
  # ─────────────────────────────────────────────────────────────────────────
  build-launcher:
    name: Launcher APK Derle
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Kaynak Kodunu İndir
        uses: actions/checkout@v4

      - name: Java 17 Kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('launcher/**/*.gradle*', 'launcher/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Launcher APK Derle
        run: |
          test -f launcher/gradlew
          chmod +x launcher/gradlew
          ./launcher/gradlew \
            --project-dir launcher \
            --settings-file "$GITHUB_WORKSPACE/launcher/settings.gradle" \
            assembleRelease \
            --no-daemon \
            -q
          echo "APK hazır:"
          find launcher -name "*.apk" | sort

      - name: APK'yı Artifact Olarak Yükle
        uses: actions/upload-artifact@v4
        with:
          name: AnkaLauncher-APK-${{ github.sha }}
          path: launcher/app/build/outputs/apk/release/*.apk
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: C Çekirdeği + ROM ZIP Derleme
  # ─────────────────────────────────────────────────────────────────────────
  build-rom:
    name: ROM Derle & Paketele (merlin)
    runs-on: ubuntu-latest
    needs: build-launcher
    permissions:
      contents: write

    steps:
      - name: Kaynak Kodunu İndir
        uses: actions/checkout@v4

      - name: Launcher APK'yı İndir
        uses: actions/download-artifact@v4
        with:
          name: AnkaLauncher-APK-${{ github.sha }}
          path: /tmp/launcher_apk

      - name: Launcher APK'yı ROM Overlay'e Kopyala
        run: |
          mkdir -p rom_overlay/system/app/AnkaLauncher
          APK=$(find /tmp/launcher_apk -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" rom_overlay/system/app/AnkaLauncher/AnkaLauncher.apk
            echo "✅ APK ROM'a eklendi: $(basename $APK)"
          else
            echo "⚠️  APK bulunamadı, ROM APK olmadan devam ediyor."
          fi

      - name: Bağımlılıkları Kur
        run: |
          sudo dpkg --add-architecture arm64
          # Mevcut kaynakları amd64 ile sınırlandır
          sudo sed -i 's/^Architectures:.*/Architectures: amd64/' \
            /etc/apt/sources.list.d/ubuntu.sources 2>/dev/null || \
            sudo sed -i '/^\(deb\|deb-src\) /{/\[arch/!s/^\(deb\|deb-src\) /\1 [arch=amd64] /}' \
            /etc/apt/sources.list 2>/dev/null || true
          # ARM64 kaynak ekle
          printf '%s\n' \
            'Types: deb' \
            'URIs: http://ports.ubuntu.com/ubuntu-ports' \
            'Suites: noble noble-updates noble-security noble-backports' \
            'Components: main restricted universe multiverse' \
            'Architectures: arm64' \
            'Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg' \
            | sudo tee /etc/apt/sources.list.d/arm64-ports.sources > /dev/null
          
          # Listeyi güncelle ve çapraz derleyici araçlarını kur
          sudo apt-get update -qq
          sudo apt-get install -y gcc gcc-aarch64-linux-gnu zip libssl-dev:arm64

      # ── Öncelik 3: Python3 ARM64 Android binary'sini ROM'a gömme ──────────
      - name: Python3 ARM64 Android'i İndir ve ROM'a Gömme
        run: |
          mkdir -p /tmp/python3_extracted
          mkdir -p rom_overlay/system/anka_core/python3/bin
          mkdir -p rom_overlay/system/anka_core/python3/lib

          # Önceden derlenmiş ARM64 Android Python3 binary
          PYTHON_URL="https://github.com/extremecoders-re/python-for-android/releases/download/v3.11.9/python3-3.11.9-android-aarch64.tar.gz"
          echo "Python3 ARM64 indiriliyor..."
          if curl -fsSL --retry 3 --retry-delay 5 -o /tmp/python3_arm64.tar.gz "$PYTHON_URL"; then
            tar -xzf /tmp/python3_arm64.tar.gz -C /tmp/python3_extracted/
            PYBIN=$(find /tmp/python3_extracted -name "python3" -type f | head -1)
            if [ -n "$PYBIN" ]; then
              cp "$PYBIN" rom_overlay/system/anka_core/python3/bin/python3
              chmod 755 rom_overlay/system/anka_core/python3/bin/python3
              STDLIB=$(find /tmp/python3_extracted -mindepth 1 -maxdepth 2 -name "python3*" -type d | grep -v bin | head -1)
              [ -n "$STDLIB" ] && cp -r "$STDLIB/." rom_overlay/system/anka_core/python3/lib/ || true
              echo "✅ Python3 ARM64 ROM'a eklendi."
            else
              echo "⚠️  Python3 binary bulunamadı, URL kontrolü gerekiyor."
            fi
          else
            echo "⚠️  Python3 indirilemedi. ROM Python3 olmadan devam ediyor."
            echo "UYARI: Python3 binary indirilemedi — agents calislamaz." \
              > rom_overlay/system/anka_core/python3/EKSIK.txt
          fi

      - name: ANKA OS Derle
        run: make all

      - name: ROM ZIP Oluştur
        run: make rom

      - name: SHA256 Kontrol Dosyası Oluştur
        run: sha256sum AnkaOS_ROM_merlin.zip > AnkaOS_ROM_merlin.zip.sha256

      - name: ROM Artifact Olarak Yükle
        uses: actions/upload-artifact@v4
        with:
          name: AnkaOS-ROM-merlin-${{ github.sha }}
          path: |
            AnkaOS_ROM_merlin.zip
            AnkaOS_ROM_merlin.zip.sha256
          retention-days: 30

      - name: Sürüm Notunu Hazırla
        run: |
          echo "## 🪰 ANKA OS ROM — Redmi Note 9 (merlin)" > release_notes.md
          echo "" >> release_notes.md
          echo "**Commit:** \`${{ github.sha }}\`" >> release_notes.md
          echo "**Tarih:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> release_notes.md
          echo "**Dal:** \`${{ github.ref_name }}\`" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 📦 İçerik" >> release_notes.md
          echo "- \`AnkaOS_ROM_merlin.zip\` — TWRP flashlanabilir ROM" >> release_notes.md
          echo "- \`AnkaLauncher.apk\` — Sistem launcher (ROM içinde gömülü)" >> release_notes.md
          echo "- Python3 ARM64 (anka_core/python3/)" >> release_notes.md
          echo "- Anka OS C çekirdeği + Kuantum motoru" >> release_notes.md
          echo "- Tüm Python agent'lar (fly_brain, nexus, jammer...)" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 🔧 Kurulum" >> release_notes.md
          echo "1. TWRP Recovery'e girin" >> release_notes.md
          echo "2. \`AnkaOS_ROM_merlin.zip\` dosyasını cihaza kopyalayın (MTP veya ADB)" >> release_notes.md
          echo "3. TWRP → Install → Dosyayı seçin → Swipe to Flash" >> release_notes.md
          echo "4. Yeniden başlatın → Ana ekran seçiminde **Anka OS** seçin" >> release_notes.md
          echo "" >> release_notes.md
          echo "### ⚠️ Uyarı" >> release_notes.md
          echo "Bu ROM yalnızca **Redmi Note 9 (merlin)** içindir." >> release_notes.md
          echo "" >> release_notes.md
          echo "### 📝 Son Değişiklikler" >> release_notes.md
          git log --oneline -10 >> release_notes.md

      - name: GitHub Release Oluştur (git tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Anka OS ${{ github.ref_name }}"
          body_path: release_notes.md
          files: |
            AnkaOS_ROM_merlin.zip
            AnkaOS_ROM_merlin.zip.sha256
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release'e Dosya Ekle (release event)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AnkaOS_ROM_merlin.zip
            AnkaOS_ROM_merlin.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: GitHub Release Oluştur (manuel tetikle)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: "Anka OS dev-${{ github.sha }}"
          tag_name: "dev-${{ github.sha }}"
          body_path: release_notes.md
          files: |
            AnkaOS_ROM_merlin.zip
            AnkaOS_ROM_merlin.zip.sha256
          draft: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3: Windows EXE Installer Derleme
  # ─────────────────────────────────────────────────────────────────────────
  build-installer-exe:
    name: Windows EXE Installer Derle
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Kaynak Kodunu İndir
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: PyInstaller Kur
        run: pip install pyinstaller

      - name: EXE Derle
        working-directory: installer
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name AnkaOS_Installer `
            anka_installer.py

      - name: EXE SHA256 Oluştur
        working-directory: installer
        run: |
          $hash = (Get-FileHash dist\AnkaOS_Installer.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  AnkaOS_Installer.exe" | Out-File -Encoding utf8 AnkaOS_Installer.exe.sha256

      - name: EXE Artifact Olarak Yükle
        uses: actions/upload-artifact@v4
        with:
          name: AnkaOS-Installer-Windows-${{ github.sha }}
          path: |
            installer/dist/AnkaOS_Installer.exe
            installer/AnkaOS_Installer.exe.sha256
          retention-days: 30

      - name: EXE'yi Release'e Ekle (git tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/dist/AnkaOS_Installer.exe
            installer/AnkaOS_Installer.exe.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
