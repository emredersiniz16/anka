name: ANKA OS ROM Build (merlin)

on:
  push:
    branches:
      - main
    paths:
      - 'core/**'
      - 'agents/**'
      - 'assets/**'
      - 'kovan/**'
      - 'rom_overlay/**'
      - 'Makefile'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Yayın kanalı (release veya dev)'
        required: false
        default: 'dev'

jobs:
  build-rom:
    name: ROM Derle & Paketele (merlin)
    runs-on: ubuntu-latest

    steps:
      - name: Kaynak Kodunu İndir
        uses: actions/checkout@v4

      - name: Bağımlılıkları Kur
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc libssl-dev zip

      - name: ANKA OS Derle
        run: make all

      - name: ROM ZIP Oluştur
        run: make rom

      - name: ROM Artifact Olarak Yükle
        uses: actions/upload-artifact@v4
        with:
          name: AnkaOS-ROM-merlin-${{ github.sha }}
          path: AnkaOS_ROM_merlin.zip
          retention-days: 30

      - name: Sürüm Notunu Hazırla
        run: |
          echo "## ANKA OS ROM — Redmi Note 9 (merlin)" > release_notes.md
          echo "" >> release_notes.md
          echo "**Commit:** \`${{ github.sha }}\`" >> release_notes.md
          echo "**Tarih:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> release_notes.md
          echo "**Dal:** \`${{ github.ref_name }}\`" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Kurulum" >> release_notes.md
          echo "1. TWRP Recovery'e girin" >> release_notes.md
          echo "2. \`AnkaOS_ROM_merlin.zip\` dosyasını cihaza kopyalayın" >> release_notes.md
          echo "3. TWRP → Install → Dosyayı seçin → Swipe to Flash" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Değişiklikler" >> release_notes.md
          git log --oneline -10 >> release_notes.md

      - name: GitHub Release Oluştur (etiket varsa)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: AnkaOS_ROM_merlin.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
